<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finis Trabaja - Panel de Empresa</title>
    <link rel="icon" type="image/png" href="images/favicon.png">
    <link <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header class="main-header">
        <div class="banner-container">
            <img src="images/banner-uft.png" alt="Universidad Finis Terrae" class="banner-img">
            <h1 id="tituloEmpresaHeader">Finis Trabaja - Panel Corporativo</h1>
            
            <button onclick="const sesionGuardada = sessionStorage.getItem('empresaLogueada'); localStorage.clear(); sessionStorage.clear(); if(sesionGuardada) sessionStorage.setItem('empresaLogueada', sesionGuardada); alert('Base de Datos simulada restaurada a los valores de fábrica.'); window.location.reload();" style="position: absolute; right: 160px; top: 20px; color: white; background: rgba(217, 83, 79, 0.9); padding: 8px 15px; border-radius: 4px; border: none; cursor: pointer; font-size: 12px; font-weight: bold; z-index: 10;">Reiniciar BD ↺</button>
            <a href="index.html" style="position: absolute; right: 20px; top: 20px; color: white; background: rgba(0,0,0,0.5); padding: 8px 15px; border-radius: 4px; text-decoration: none; font-size: 12px; font-weight: bold; z-index: 10;">➔ Cerrar Sesión</a>
        </div>
        <nav class="tab-navigation">
            <button id="btnTabGlobal" class="tab-button active" onclick="cambiarSeccionEmpresa('global')">EXPLORADOR GLOBAL</button>
            <button id="btnTabMisOfertas" class="tab-button" onclick="cambiarSeccionEmpresa('propias')">MIS OFERTAS (GESTIÓN)</button>
        </nav>
    </header>

    <div class="main-container">
        <aside class="profile-sidebar">
            <div id="empresaAvatar" class="profile-avatar" style="font-size: 24px;">EMP</div>
            <div class="profile-info">
                <h2 id="nombreEmpresaSidebar">Cargando Empresa...</h2>
                <p><strong>Tipo:</strong> Entidad Asociada UFT</p>
                <p><strong>Convenio:</strong> Activo (2026)</p>
            </div>
        </aside>

        <main class="offers-content" id="contenedorEmpresaDinamico" style="width: 100%; display: flex; flex-direction: column; gap: 16px;"></main>
    </div>

    <script src="js/db.js"></script>
    <script src="js/empresa.js"></script>
</body>
</html>
